<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CashSnap - Banknote Counter & OCR Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workbench">
        <header class="topbar">
          <div>
            <p class="eyebrow">CashSnap alpha</p>
            <h1>Bill counter</h1>
          </div>
          <div class="status" id="modelStatus">Loading models</div>
        </header>

        <div class="controls" aria-label="Detection controls">
          <label class="file-button">
            <input id="imageInput" type="file" accept="image/*" />
            <span>Choose photo</span>
          </label>
          <label class="threshold">
            <span>Confidence</span>
            <input id="confSlider" type="range" min="0.01" max="0.80" step="0.01" value="0.05" />
            <output id="confValue">0.05</output>
          </label>
          <button id="runButton" type="button" disabled>Run</button>
        </div>

        <div class="stage">
          <canvas id="imageCanvas" width="1280" height="840" aria-label="Detection preview"></canvas>
          <div class="empty" id="emptyState">Load a spread or overlap photo to run the exported ONNX model in this browser.</div>
        </div>
      </section>

      <aside class="panel" aria-label="Detection summary">
        <div class="metric">
          <span>Total bills</span>
          <strong id="totalCount">0</strong>
        </div>
        <div class="metric">
          <span>Estimated value</span>
          <strong id="totalValue">KHR 0</strong>
        </div>
        <div class="note">
          Two-stage diagnostic: detector proposals plus KHR fragment re-read. Treat results as review hints.
        </div>
        <div class="counts" id="countsList"></div>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
